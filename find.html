<!-- Main -->

<main>

<h1>Find a Fundraiser</h1>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search fundraisers..."
>

</div>

<div class="fundraiser-cards" id="fundraiserCards"></div>

</main>


<script src="js/menu.js"></script>

<script>

const container = document.getElementById('fundraiserCards');
const searchInput = document.getElementById('searchInput');

const API = "https://sisi-kwa-sisi-api.onrender.com";

let allFundraisers = [];


/* LOAD FUNDRAISERS */

fetch('https://sisi-kwa-sisi-api.onrender.com/fundraisers.json')
.then(res => res.json())
.then(data => {

allFundraisers = data;

renderFundraisers(allFundraisers);

})
.catch(err => {

console.error(err);

container.innerHTML =
'<p>Unable to load fundraisers. Make sure the server is running.</p>';

});


/* SEARCH */

searchInput.addEventListener("input", () => {

const term = searchInput.value.toLowerCase();

const filtered = allFundraisers.filter(f =>

f.title.toLowerCase().includes(term) ||
f.name.toLowerCase().includes(term) ||
f.shortDesc.toLowerCase().includes(term)

);

renderFundraisers(filtered);

});


/* RENDER FUNDRAISERS */

function renderFundraisers(list){

container.innerHTML = "";

list.forEach(f => {

const card = document.createElement('div');
card.className = 'card';


/* IMAGE */

const mainImg = document.createElement('img');

mainImg.className = 'main-img';
mainImg.src = `${API}/images/${f.images[0]}`;
mainImg.alt = f.title;

card.appendChild(mainImg);


/* DETAILS */

const details = document.createElement('div');

fetch(`https://sisi-kwa-sisi-api.onrender.com/fundraiser/${f.id}/total`)
.then(res => res.json())
.then(totalData => {

const raised = totalData.totalRaised;
const target = Number(f.target);

const progress = Math.min((raised / target) * 100, 100);

details.innerHTML = `

<h3>${f.title}</h3>

<p><strong>Name:</strong> ${f.name}</p>

<div class="fund-progress">

<div class="progress-text">
<strong>KES ${raised}</strong> raised of <strong>KES ${target}</strong>
</div>

<div class="progress-bar">
<div class="progress-fill" style="width:${progress}%"></div>
</div>

<div class="progress-meta">
${Math.round(progress)}% funded • ${raised > 0 ? 1 : 0} donation
</div>

</div>

<p>${f.shortDesc}</p>

<a href="fundraiser.html?id=${f.id}" class="btn">More</a>

`;

});

card.appendChild(details);

container.appendChild(card);

});

}

</script>
